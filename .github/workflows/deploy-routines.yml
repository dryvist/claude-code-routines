---
name: Deploy routines

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  id-token: write

concurrency:
  group: deploy-routines
  cancel-in-progress: false

jobs:
  deploy:
    name: Push prompt changes to Anthropic Routines API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >-
            Read .github/workflows/prompts/deploy-routines.prompt.md and follow
            every instruction in it.
          claude_args: >-
            --allowedTools "Read,Edit,Glob,RemoteTrigger,Bash(gh api repos/*:*),Bash(jq:*),Bash(base64:*)"
            --max-turns 40
            --model sonnet
