name: The Solver

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: read

concurrency:
  group: solver
  cancel-in-progress: false

jobs:
  solve:
    name: Pick one task (Linear primary, GH-Issue fallback), open ready-for-review PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Mint JacobPEvans-claude installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_APP_CLAUDE_BOT_ID }}
          private-key: ${{ secrets.GH_APP_CLAUDE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run The Solver
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_OWNER: ${{ github.repository_owner }}
          # Linear Personal API Key, scoped to JAC team only. If unset, The
          # Solver skips its primary queue and falls through to GH-Issue
          # label-gated fallback (Path E in the prompt). Configure via:
          # gh secret set LINEAR_API_KEY --body "<key>" --repo <this-repo>
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          # NOTE: this param may be vestigial. The Solver authenticates via
          # the App installation token in $GH_TOKEN (see env: above); the prompt
          # never reads $CLAUDE_CODE_OAUTH_TOKEN. The Routines-API breakage
          # diagnosed on 2026-05-19 left this workflow unaffected because it
          # does not call RemoteTrigger. A future session should test removing
          # this line and re-running the workflow — if it still succeeds, drop
          # the secret reference entirely.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >-
            Read routines/issue-solver.prompt.md and follow every instruction
            in it. You are running inside GitHub Actions with a
            JacobPEvans-claude App installation token in $GH_TOKEN, and a
            Linear Personal API Key in $LINEAR_API_KEY (scoped to JAC team
            only). All target-repo file changes go through the GraphQL
            createCommitOnBranch mutation
            (`gh api graphql --input -`); GitHub auto-signs and attributes
            those commits to JacobPEvans-claude[bot]. Do not fall back to
            the Contents API PUT, and do not attempt git push/commit/add
            against target repos — both paths land unsigned or
            wrong-identity commits and the tool allowlist blocks them.
          claude_args: >-
            --allowedTools "Read,Edit,Write,Glob,Grep,WebFetch,Task,Bash(gh search:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh gist:*),Bash(gh run:*),Bash(gh repo view:*),Bash(gh label:*),Bash(gh api repos/*:*),Bash(gh api graphql:*),Bash(scripts/linear-query.sh:*),Bash(jq:*),Bash(date:*),Bash(grep:*),Bash(base64:*),Bash(tr:*)"
            --max-turns 80
            --model claude-sonnet-4-6
