name: issue-solver

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: read

concurrency:
  group: solver
  cancel-in-progress: false

jobs:
  solve:
    name: Pick one Linear task (JAC), open ready-for-review PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mint dryvist-claude installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GH_APP_CLAUDE_BOT_ID }}
          private-key: ${{ secrets.GH_APP_CLAUDE_BOT_PRIVATE_KEY }}
          # owner (org-wide) is required: issue-solver opens PRs and runs
          # createCommitOnBranch against whichever dryvist target repo a Linear
          # task maps to — the target set is not statically enumerable, so
          # `repositories:` cannot replace it. Permissions are scoped to what
          # the run actually uses.
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-actions: read

      # Single source of truth for the model id: routines/_common/deploy.config
      # (CLAUDE_SONNET_MODEL_ID). Fail loud early if it's missing rather than
      # passing an empty --model to the expensive run step.
      - name: Resolve model id
        id: model
        run: |
          id=$(grep -m1 '^CLAUDE_SONNET_MODEL_ID=' routines/_common/deploy.config | cut -d= -f2 | tr -d '\r')
          [ -n "$id" ] || { echo "CLAUDE_SONNET_MODEL_ID not found in routines/_common/deploy.config"; exit 1; }
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Run issue-solver
        uses: anthropics/claude-code-action@536f2c32a39763739000b0e1ac69ca2647d97ce9 # v1.0.170
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_OWNER: ${{ github.repository_owner }}
          STATE_REPO: dryvist/routine-state
          # Linear Personal API Key, JAC team only. If unset, the prompt emits
          # Path E (config gap) and exits — there is no GitHub-issue fallback.
          # Configure via:
          # gh secret set LINEAR_API_KEY --body "<key>" --repo <this-repo>
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          # Authenticates claude-code-action to the Anthropic API. Unrelated to
          # the Routines/RemoteTrigger API (that breakage never affected this
          # workflow).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >-
            Read routines/issue-solver.prompt.md and follow every instruction
            We run the prompt natively inside Actions, passing the
            dryvist-claude App installation token in $GH_TOKEN, and a
            Linear Personal API Key in $LINEAR_API_KEY (scoped to JAC team
            only). All target-repo file changes go through the GraphQL
            createCommitOnBranch mutation
            mutation (via `gh api graphql`) from the prompt to attribute
            those commits to dryvist-claude[bot]. Do not fall back to
            the Contents API PUT, and do not attempt git push/commit/add
            against target repos — both paths land unsigned or
            wrong-identity commits and the tool allowlist blocks them.
          claude_args: >-
            --allowedTools "Read,Edit,Write,Glob,Grep,WebFetch,Task,Bash(gh search:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh run:*),Bash(gh repo view:*),Bash(gh label:*),Bash(gh api repos/*:*),Bash(gh api graphql:*),Bash(curl -sS -X POST https://api.linear.app/graphql:*),Bash(jq:*),Bash(date:*),Bash(grep:*),Bash(base64:*),Bash(tr:*)"
            --max-turns 80
            --model ${{ steps.model.outputs.id }}
