name: issue-solver

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *'

permissions:
  contents: read

concurrency:
  group: solver
  cancel-in-progress: false

jobs:
  solve:
    name: Pick one Linear task (JAC), open ready-for-review PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Mint dryvist-claude installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.GH_APP_CLAUDE_BOT_ID }}
          private-key: ${{ secrets.GH_APP_CLAUDE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run issue-solver
        uses: anthropics/claude-code-action@769e3bdff9bb7ecfb51bad4c9cba23d6f5fc5ea5 # v1.0.163
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_OWNER: ${{ github.repository_owner }}
          STATE_REPO: dryvist/routine-state
          # Linear Personal API Key, JAC team only. If unset, the prompt emits
          # Path E (config gap) and exits — there is no GitHub-issue fallback.
          # Configure via:
          # gh secret set LINEAR_API_KEY --body "<key>" --repo <this-repo>
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          # Authenticates claude-code-action to the Anthropic API. Unrelated to
          # the Routines/RemoteTrigger API (that breakage never affected this
          # workflow).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >-
            Read routines/issue-solver.prompt.md and follow every instruction
            We run the prompt natively inside Actions, passing the
            dryvist-claude App installation token in $GH_TOKEN, and a
            Linear Personal API Key in $LINEAR_API_KEY (scoped to JAC team
            only). All target-repo file changes go through the GraphQL
            createCommitOnBranch mutation
            mutation (via `gh api graphql`) from the prompt to attribute
            those commits to dryvist-claude[bot]. Do not fall back to
            the Contents API PUT, and do not attempt git push/commit/add
            against target repos — both paths land unsigned or
            wrong-identity commits and the tool allowlist blocks them.
          claude_args: >-
            --allowedTools "Read,Edit,Write,Glob,Grep,WebFetch,Task,Bash(gh search:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh run:*),Bash(gh repo view:*),Bash(gh label:*),Bash(gh api repos/*:*),Bash(gh api graphql:*),Bash(curl -sS -X POST https://api.linear.app/graphql:*),Bash(jq:*),Bash(date:*),Bash(grep:*),Bash(base64:*),Bash(tr:*)"
            --max-turns 80
            --model claude-sonnet-5
